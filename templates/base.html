<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2e7d32">
  <title>{% block title %}懂鸟图鉴{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="back" href="{{ url_for('index') }}">‹</a>
    <h1>{% block header %}{% endblock %}</h1>
    <span class="spacer"></span>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    window.bp = {
      getLocation() {
        return localStorage.getItem('bp_location') || '全部';
      },
      setLocation(v) {
        localStorage.setItem('bp_location', v);
      },
      // 挂载可搜索的分级地点选择器
      // container: DOM 元素；locations: 地点键数组；opts: {name, value, onSelect}
      mountLocPicker(container, locations, opts) {
        opts = opts || {};
        let current = opts.value || this.getLocation();
        if (!locations.includes(current)) current = '全部';

        container.classList.add('loc-picker');
        container.innerHTML = '';

        const trigger = document.createElement('button');
        trigger.type = 'button';
        trigger.className = 'loc-trigger';
        container.appendChild(trigger);

        let hidden = null;
        if (opts.name) {
          hidden = document.createElement('input');
          hidden.type = 'hidden';
          hidden.name = opts.name;
          hidden.value = current;
          container.appendChild(hidden);
        }

        const label = v => v.includes('/') ? v.split('/').join(' › ') : v;
        const setVal = v => {
          current = v;
          trigger.innerHTML = '📍 <span>' + label(v) + '</span> <i class="caret">▾</i>';
          if (hidden) hidden.value = v;
          this.setLocation(v);
        };
        setVal(current);

        // 弹出层
        const modal = document.createElement('div');
        modal.className = 'loc-modal';
        modal.innerHTML =
          '<div class="loc-sheet">' +
            '<div class="loc-sheet-head"><span>选择地区</span><b class="loc-close">✕</b></div>' +
            '<div class="loc-search-wrap">' +
              '<input class="loc-search" placeholder="搜索地区（如：浙江 / 余杭）…" autocomplete="off">' +
            '</div>' +
            '<div class="loc-list"></div>' +
          '</div>';
        document.body.appendChild(modal);
        const list = modal.querySelector('.loc-list');
        const searchInput = modal.querySelector('.loc-search');

        const renderOpt = (val, text) =>
          '<div class="loc-opt' + (val === current ? ' active' : '') +
          '" data-value="' + val + '"><span>' + text + '</span>' +
          (val === current ? '<b class="tick">✓</b>' : '') + '</div>';

        function buildList(filter) {
          const f = (filter || '').toLowerCase().trim();
          const matched = locations.filter(k => {
            // 排除月份后缀 key（如 base_6），列表只显示基础地点
            const mm = k.match(/^(.*)_(\d+)$/);
            if (mm && locations.indexOf(mm[1]) !== -1) return false;
            if (!f) return true;
            return k.toLowerCase().includes(f) ||
              (k.split('/').pop() || '').toLowerCase().includes(f);
          });
          const standalone = [], groups = {};
          for (const k of matched) {
            if (k === '全部' || !k.includes('/')) standalone.push(k);
            else {
              const top = k.split('/')[0];
              (groups[top] = groups[top] || []).push(k);
            }
          }
          let html = '';
          if (standalone.includes('全部'))
            html += renderOpt('全部', '全部鸟类');
          for (const k of standalone) {
            if (k === '全部') continue;
            html += renderOpt(k, k);
          }
          for (const [top, items] of Object.entries(groups)) {
            html += '<div class="loc-group">' + top + '</div>';
            for (const k of items) {
              html += renderOpt(k, k.split('/').slice(1).join(' › '));
            }
          }
          if (!html) html = '<div class="loc-empty">无匹配地区</div>';
          list.innerHTML = html;
          list.querySelectorAll('.loc-opt').forEach(el => {
            el.addEventListener('click', () => {
              setVal(el.dataset.value);
              closeModal();
              if (opts.onSelect) opts.onSelect(el.dataset.value);
            });
          });
        }
        const openModal = () => {
          modal.classList.add('open');
          searchInput.value = '';
          buildList('');
          setTimeout(() => searchInput.focus(), 60);
        };
        const closeModal = () => modal.classList.remove('open');

        trigger.addEventListener('click', openModal);
        modal.addEventListener('click', e => {
          if (e.target === modal || e.target.classList.contains('loc-close'))
            closeModal();
        });
        searchInput.addEventListener('input', () => buildList(searchInput.value));

        return { getVal: () => current, setVal };
      },
      // ---- 月份筛选 ----
      // 各页面初始化时设置：bp.ALL_LOCATIONS = [...]
      getMonth() {
        return localStorage.getItem('bp_month') || '0';
      },
      setMonth(m) {
        localStorage.setItem('bp_month', m);
      },
      // 某基础地点下有数据月份的列表（检查 base_1 ~ base_12 是否存在）
      availableMonths(locations, base) {
        const ms = [];
        for (let i = 1; i <= 12; i++) {
          if (locations.indexOf(base + '_' + i) !== -1) ms.push(i);
        }
        return ms;
      },
      // 实际传给后端的 location（含月份后缀，如 base_6）
      fullLocation() {
        const base = this.getLocation();
        const m = this.getMonth();
        if (m && m !== '0') {
          if (this.availableMonths(this.ALL_LOCATIONS || [], base).indexOf(+m) !== -1) {
            return base + '_' + m;
          }
        }
        return base;
      },
      // 从 URL 带回的 location（可能是 base 或 base_month）拆分出 {base, month}
      parseFullLocation(loc, locations) {
        const mm = loc.match(/^(.*)_(\d+)$/);
        if (mm && locations.indexOf(loc) !== -1 && locations.indexOf(mm[1]) !== -1) {
          return { base: mm[1], month: mm[2] };
        }
        return { base: loc, month: '0' };
      },
      // 挂载月份下拉；opts: { getBase, onSelect }
      // getBase: 返回当前基础地点的函数（默认 bp.getLocation）
      // onSelect: 月份变化回调
      // 返回 { update(), getVal() }
      mountMonthPicker(container, locations, opts) {
        opts = opts || {};
        container.classList.add('month-picker-wrap');
        container.innerHTML = '';
        const sel = document.createElement('select');
        sel.className = 'month-select';
        container.appendChild(sel);
        const getBase = opts.getBase || (() => this.getLocation());
        const rebuild = () => {
          const base = getBase();
          const months = this.availableMonths(locations, base);
          let html = '<option value="0">全年</option>';
          for (const m of months) html += '<option value="' + m + '">' + m + '月</option>';
          sel.innerHTML = html;
          let cur = this.getMonth();
          if (cur !== '0' && months.indexOf(+cur) === -1) {
            cur = '0';
            this.setMonth(cur);
          }
          sel.value = cur;
        };
        rebuild();
        sel.addEventListener('change', () => {
          this.setMonth(sel.value);
          if (opts.onSelect) opts.onSelect(sel.value);
        });
        return { update: rebuild, getVal: () => sel.value };
      }
    };
  </script>
  <script>{% block script %}{% endblock %}</script>
</body>
</html>
